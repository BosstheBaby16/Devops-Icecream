services:

  # -------------------------------------------------------
  # Main Application Service
  # -------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: icecream-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://admin:password@mongo:27017/icecream?authSource=admin
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - icecream-network

  # -------------------------------------------------------
  # MongoDB Database
  # -------------------------------------------------------
  mongo:
    image: mongo:6-jammy
    container_name: icecream-mongo
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=icecream
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - icecream-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # -------------------------------------------------------
  # Redis Cache
  # -------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: icecream-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - icecream-network
    command: redis-server --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ==============================================================
# Volumes
# ==============================================================
volumes:
  mongo-data:
    driver: local

# ==============================================================
# Networks
# ==============================================================
networks:
  icecream-network:
    driver: bridge
